<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام المحيط للموارد البشرية - v6</title>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- App Config & Storage Layer -->
<script>
const SUPABASE_URL = 'https://hzzbkyqcxyjqfwvtcizq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6emJreXFjeHlqcWZ3dnRjaXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzEzMDQsImV4cCI6MjA5NTEwNzMwNH0.YBN2AoNsJS3pMZ04iS3yLWX5z360UgWAOaYCn6Y42T4';
const STORAGE_MODE = 'supabase';
</script>
<script src="src/js/supabase.js"></script>
<link rel="stylesheet" href="src/css/styles.css">
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <rect width="56" height="56" rx="14" fill="#1B4F8A"/>
        <path d="M14 28L22 16L30 28L22 40Z" fill="#00B4D8"/>
        <circle cx="40" cy="28" r="8" fill="white" opacity="0.9"/>
        <path d="M36 40L40 32L44 40Z" fill="white" opacity="0.6"/>
      </svg>
      <div class="login-title">المحيط للموارد البشرية</div>
      <div class="login-sub">AL MUEHEET Engineering Consulting</div>
    </div>
    <div class="login-form">
      <div>
        <label class="form-label">اسم المستخدم</label>
        <input class="login-input" id="loginUser" placeholder="أدخل اسم المستخدم" value="admin">
      </div>
      <div>
        <label class="form-label">كلمة المرور</label>
        <input class="login-input" type="password" id="loginPass" placeholder="أدخل كلمة المرور" value="admin123">
      </div>
      <div id="loginErr" class="login-err"></div>
      <button class="login-btn" onclick="doLogin()">تسجيل الدخول</button>
      <div style="font-size:11px;color:var(--text3);text-align:center;">أو اختر دوراً للتجربة السريعة:</div>
      <div class="login-roles">
        <button class="login-role-btn" onclick="quickLogin('admin')">👑 مدير</button>
        <button class="login-role-btn" onclick="quickLogin('manager')">📋 مدير مشروع</button>
        <button class="login-role-btn" onclick="quickLogin('employee')">👤 موظف</button>
      </div>
    </div>
  </div>
</div>

<!-- SIDEBAR OVERLAY (MOBILE) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- APP -->
<div id="app" style="display:none">
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-wrap">
      <svg viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="12" fill="rgba(255,255,255,0.15)"/><path d="M14 28L22 16L30 28L22 40Z" fill="#00B4D8"/><circle cx="40" cy="28" r="8" fill="white" opacity="0.9"/></svg>
    </div>
    <div class="sidebar-title">نظام الموارد البشرية</div>
    <div class="sidebar-sub" id="storageModeLabel">HR Management v6 ☁️</div>
  </div>
  <nav class="nav" id="sidebarNav"></nav>
  <div class="sidebar-user">
    <div class="user-av" id="userAv">مد</div>
    <div>
      <div class="user-name" id="userName">مدير النظام</div>
      <div class="user-role" id="userRoleLabel">مدير موارد بشرية</div>
      <div class="role-tabs" id="roleTabs"></div>
    </div>
  </div>
</div>

<div class="main">
  <!-- TOP HEADER BAR -->
  <div class="top-header">
    <div class="top-header-left">
      <button class="hamburger" onclick="toggleSidebar()" title="القائمة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="global-search">
        <input placeholder="🔍 بحث شامل في الموظفين، المهام، المستندات..." id="globalSearch" onkeyup="globalSearchHandler()" autocomplete="off">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
    </div>
    <div class="top-header-right">
      <span class="top-header-date" id="headerDate"></span>
      <div class="notif-btn" onclick="toggleNotif()" title="الإشعارات">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-count" id="notifCount">0</span>
      </div>
      <button id="darkModeBtn" onclick="toggleDarkMode()" title="Dark Mode" style="width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all 0.2s;">🌙</button>
      <button class="btn btn-danger btn-sm" onclick="doLogout()" title="تسجيل الخروج" style="display:flex;align-items:center;gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        خروج
      </button>
    </div>
  </div>

  <div class="notif-panel" id="notifPanel">
    <div class="notif-header">
      <span>🔔 الإشعارات</span>
      <button class="btn btn-xs" onclick="markAllRead()">تحديد كمقروءة</button>
    </div>
    <div id="notifList"></div>
  </div>

  <!-- PAGES -->
  <div id="page-dashboard" class="page active"></div>
  <div id="page-employees" class="page"></div>
  <div id="page-salary" class="page"></div>
  <div id="page-attendance" class="page"></div>
  <div id="page-leaves" class="page"></div>
  <div id="page-performance" class="page"></div>
  <div id="page-training" class="page"></div>
  <div id="page-tasks" class="page"></div>
  <div id="page-documents" class="page"></div>
  <div id="page-disciplinary" class="page"></div>
  <div id="page-reports" class="page"></div>
  <div id="page-portal" class="page"></div>
  <div id="page-audit" class="page"></div>
  <div id="page-settings" class="page"></div>
</div>
</div>

<div id="modalContainer"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="lang-sw">
  <div class="lang-opt active" onclick="setLang('ar')">عربي</div>
  <div class="lang-opt" onclick="setLang('en')">EN</div>
</div>

<script src="src/js/app.js"></script>
</body>
</html>
